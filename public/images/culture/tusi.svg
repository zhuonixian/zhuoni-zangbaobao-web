<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#860C1E"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B6A766" stop-opacity="0"/>
      <stop offset="50%" stop-color="#B6A766" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B6A766" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Decorative pattern - traditional Tibetan frame -->
  <rect x="30" y="30" width="740" height="340" rx="8" fill="none" stroke="#B6A766" stroke-width="1" opacity="0.15"/>
  <rect x="40" y="40" width="720" height="320" rx="5" fill="none" stroke="#B6A766" stroke-width="0.5" opacity="0.1"/>
  <!-- Decorative corners -->
  <path d="M50 50 L80 50 M50 50 L50 80" fill="none" stroke="#B6A766" stroke-width="1.5" opacity="0.3"/>
  <path d="M750 50 L720 50 M750 50 L750 80" fill="none" stroke="#B6A766" stroke-width="1.5" opacity="0.3"/>
  <path d="M50 350 L80 350 M50 350 L50 320" fill="none" stroke="#B6A766" stroke-width="1.5" opacity="0.3"/>
  <path d="M750 350 L720 350 M750 350 L750 320" fill="none" stroke="#B6A766" stroke-width="1.5" opacity="0.3"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="80" fill="#B6A766" opacity="0.04"/>
  <circle cx="150" cy="300" r="60" fill="#B6A766" opacity="0.04"/>
  <!-- Category label -->
  <rect x="60" y="60" width="100" height="28" rx="4" fill="#B6A766" opacity="0.15"/>
  <text x="110" y="79" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#B6A766">文化</text>
  <!-- Center divider -->
  <rect x="200" y="195" width="400" height="1.5" fill="url(#accent)"/>
  <!-- Title -->
  <text x="400" y="170" text-anchor="middle" font-family="serif" font-size="42" fill="white" font-weight="bold">土司历史文化</text>
  <text x="400" y="225" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#B6A766" opacity="0.7">五百年的边疆治理传奇</text>
</svg>
