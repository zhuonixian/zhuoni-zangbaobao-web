<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B4C3B"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B6A766" stop-opacity="0"/>
      <stop offset="50%" stop-color="#B6A766" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#B6A766" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect x="0" y="195" width="600" height="2" fill="url(#accent)"/>
  <!-- Decorative circles -->
  <circle cx="500" cy="100" r="70" fill="#B6A766" opacity="0.05"/>
  <circle cx="100" cy="300" r="50" fill="#860C1E" opacity="0.06"/>
  <!-- Category label -->
  <rect x="20" y="20" width="80" height="26" rx="4" fill="#B6A766" opacity="0.2"/>
  <text x="60" y="38" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#B6A766">食用菌类</text>
  <!-- Product icon - mushroom shape -->
  <ellipse cx="300" cy="145" rx="40" ry="25" fill="none" stroke="#B6A766" stroke-width="1.5" opacity="0.5"/>
  <rect x="290" y="145" width="20" height="30" rx="3" fill="none" stroke="#B6A766" stroke-width="1" opacity="0.4"/>
  <!-- Name -->
  <text x="300" y="240" text-anchor="middle" font-family="serif" font-size="36" fill="white" font-weight="bold">羊肚菌</text>
  <text x="300" y="272" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#B6A766" opacity="0.7">菌中之王 · 肉质肥厚</text>
</svg>
