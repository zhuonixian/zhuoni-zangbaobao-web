<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#860C1E"/>
      <stop offset="100%" stop-color="#6B4C3B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B6A766" stop-opacity="0"/>
      <stop offset="50%" stop-color="#B6A766" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#B6A766" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect x="0" y="195" width="600" height="2" fill="url(#accent)"/>
  <!-- Decorative circles -->
  <circle cx="470" cy="90" r="55" fill="#B6A766" opacity="0.06"/>
  <circle cx="130" cy="330" r="40" fill="#2D5016" opacity="0.08"/>
  <!-- Category label -->
  <rect x="20" y="20" width="80" height="26" rx="4" fill="#B6A766" opacity="0.2"/>
  <text x="60" y="38" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#B6A766">食用菌类</text>
  <!-- Product icon - dome shape -->
  <path d="M270 170 Q300 130 330 170" fill="none" stroke="#B6A766" stroke-width="1.5" opacity="0.5"/>
  <rect x="290" y="170" width="20" height="20" rx="2" fill="none" stroke="#B6A766" stroke-width="1" opacity="0.4"/>
  <!-- Name -->
  <text x="300" y="240" text-anchor="middle" font-family="serif" font-size="36" fill="white" font-weight="bold">姬松茸</text>
  <text x="300" y="272" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#B6A766" opacity="0.7">色泽金黄 · 营养丰富</text>
</svg>
