<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D5016"/>
      <stop offset="100%" stop-color="#B6A766"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect x="0" y="195" width="600" height="2" fill="url(#accent)"/>
  <circle cx="500" cy="100" r="55" fill="#1A1A2E" opacity="0.06"/>
  <circle cx="100" cy="310" r="40" fill="#860C1E" opacity="0.06"/>
  <!-- Category label -->
  <rect x="20" y="20" width="80" height="26" rx="4" fill="white" opacity="0.15"/>
  <text x="60" y="38" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">手工艺品</text>
  <!-- Product icon - inkstone shape -->
  <rect x="270" y="130" width="60" height="50" rx="5" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="300" cy="155" rx="15" ry="10" fill="none" stroke="white" stroke-width="0.8" opacity="0.2"/>
  <!-- Name -->
  <text x="300" y="240" text-anchor="middle" font-family="serif" font-size="36" fill="white" font-weight="bold">洮砚</text>
  <text x="300" y="272" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" opacity="0.6">四大名砚 · 千年传承</text>
</svg>
