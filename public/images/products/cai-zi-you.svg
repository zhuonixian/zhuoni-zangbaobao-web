<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B6A766"/>
      <stop offset="100%" stop-color="#6B4C3B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <rect x="0" y="195" width="600" height="2" fill="url(#accent)"/>
  <circle cx="500" cy="90" r="55" fill="#860C1E" opacity="0.06"/>
  <circle cx="100" cy="320" r="40" fill="#2D5016" opacity="0.08"/>
  <!-- Category label -->
  <rect x="20" y="20" width="80" height="26" rx="4" fill="white" opacity="0.15"/>
  <text x="60" y="38" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">粮油加工</text>
