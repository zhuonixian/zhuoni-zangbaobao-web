  <path d="M300 125 Q315 155 300 180 Q285 155 300 125Z" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <!-- Name -->
  <text x="300" y="240" text-anchor="middle" font-family="serif" font-size="36" fill="white" font-weight="bold">菜籽油</text>
  <text x="300" y="272" text-anchor="middle" font-family="sans-serif" font-size="14" fill="white" opacity="0.6">物理压榨 · 金黄醇香</text>
